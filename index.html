<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COS-Scoreboard</title>

    <link rel="icon" href="pokal.png" type="image/png">
    <link rel="manifest" href="manifest.json">

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* --- CSS VARIABLES & THEMES OmSPwCQUtVDnCcNp https://supabase.com/dashboard/project/qmgmvweupxffxexlovir/database/functions--- */
        :root {
            --bg-color: #f4f4f9;
            --surface-color: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --primary-color: #8b5a2b; /* Kaffeebraun */
            --border-color: #dddddd;
            --star-active: #ffb400;
            --star-inactive: #e0e0e0;
        }

        [data-theme="dark"] {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-color: #e0e0e0;
            --text-muted: #aaaaaa;
            --primary-color: #d2a679;
            --border-color: #333333;
            --star-inactive: #444444;
        }

        /* --- BASICS --- */
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); 
            display: flex; justify-content: center; transition: background-color 0.3s;
        }
        
        #app { 
            width: 100%; min-height: 100vh; background-color: var(--surface-color); padding: 20px; 
            box-shadow: 0 0 15px rgba(0,0,0,0.1); overflow-x: hidden; touch-action: pan-y; 
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding-bottom: 10px; }
        h1 { margin: 0; font-size: 24px; color: var(--primary-color); }
        .theme-toggle { background: none; border: none; font-size: 24px; cursor: pointer; color: var(--text-color); }

        /* --- TABS --- */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { 
            flex: 1; padding: 10px; border: 1px solid var(--border-color); background: var(--surface-color); 
            color: var(--text-color); border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
            font-size: 13px;
        }
        .tab-btn.active { background: var(--primary-color); color: white; border-color: var(--primary-color); }
        
        /* Animation Classes */
        .slide-in-right { animation: slideInRight 0.3s forwards ease-out; }
        .slide-in-left { animation: slideInLeft 0.3s forwards ease-out; }
        .fade-in { animation: fadeIn 0.3s forwards ease-out; }

        @keyframes slideInRight {
            0% { transform: translateX(20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideInLeft {
            0% { transform: translateX(-20px); opacity: 0; }
            100% { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* --- UI ELEMENTS --- */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        select, input, textarea { 
            width: 100%; padding: 8px; border: 1px solid var(--border-color); border-radius: 8px; 
            background: var(--bg-color); color: var(--text-color); font-size: 16px;
        }
        button.primary { 
            width: 100%; padding: 15px; background: var(--primary-color); color: white; 
            border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }

        /* --- STARS --- */
        .rating-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; padding: 8px; background: var(--bg-color); border-radius: 8px; }
        .stars { display: flex; gap: 5px; font-size: 24px; color: var(--star-inactive); }
        .star.active { color: var(--star-active); }
        .overall-score { font-size: 18px; font-weight: bold; color: var(--primary-color); text-align: center; margin: 15px 0; }

        /* --- MODALS --- */
        .modal-overlay { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); 
            display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal { background: var(--surface-color); padding: 15px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .d-none { display: none !important; }

        /* --- LISTS --- */
        .leaderboard-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid var(--border-color); }
        .rank { font-weight: bold; color: var(--primary-color); margin-right: 15px; }
    </style>
</head>
<body>

    <div id="loginModal" class="modal-overlay d-none">
        <div class="modal">
            <h2>Willkommen! ☕</h2>
            <p>Bitte gib deinen Nutzernamen ein.</p>
            <input type="text" id="usernameInput" placeholder="Dein Name..." style="margin-bottom: 15px;">
            <button class="primary" onclick="saveUsername()">Los geht's</button>
        </div>
    </div>

    <div id="hintModal" class="modal-overlay d-none">
        <div class="modal" style="text-align: left;">
            <h2 style="text-align: center;">So funktioniert's:</h2>
            <p><strong>1.</strong> Wähle Kaffee oder Espresso.<br>
               <strong>2.</strong> Sorte wählen oder mit "+" neu anlegen.<br>
               <strong>3.</strong> Sterne vergeben & speichern.<br>
               <strong>4.</strong> Check das Team-Ranking!</p>
            <button class="primary" onclick="closeHint()">Verstanden 🤌🏻</button>
        </div>
    </div>

    <div id="notesModal" class="modal-overlay d-none">
        <div class="modal" style="text-align: left; max-height: 80vh; display: flex; flex-direction: column;">
            <h2 id="notesModalTitle" style="text-align: center;">Kommentare</h2>
            <div id="notesModalContent" style="overflow-y: auto; flex: 1; margin-bottom: 15px;"></div>
            <button class="primary" onclick="closeNotesModal()">Schließen</button>
        </div>
    </div>

    <div id="app">
        <header>
            <h1>☰ Hallo Hendrik</h1>
            <button class="theme-toggle" onclick="toggleTheme()" id="themeIcon">🌤️</button>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('kaffee', event)">Kaffee</button>
            <button class="tab-btn" onclick="switchTab('espresso', event)">Espresso</button>
            <button class="tab-btn" onclick="switchTab('personal', event)">Favoriten</button>
            <button class="tab-btn" onclick="switchTab('team', event)">Team</button>
        </div>

        <div id="ratingSection">
            <div class="form-group">
                <label id="typeLabel">Kaffeesorte auswählen:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="varietySelect" onchange="checkExistingRating()" style="flex: 1;">
                        <option value="">Lade Sorten...</option>
                    </select>
                    <button onclick="addNewVarietyViaPrompt()" style="padding: 0 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--surface-color); color: var(--text-color); font-weight: bold;">➕</button>
                </div>
            </div>
            
            <div id="starContainer"></div>

            <div class="form-group">
                <textarea id="notesInput" rows="3" placeholder="Dein Kommentar zur Sorte..."></textarea>
            </div>

            <div class="overall-score" id="overallScoreDisplay">Gesamtbewertung: 0.0 / 5.0</div>
            <button class="primary" onclick="saveRating()">Bewertung speichern</button>
        </div>

        <div id="teamSection" style="display: none;">
            <h2 id="teamSectionTitle">Bestenliste</h2>
            <div id="leaderboardContainer"></div>
        </div>
    </div>

    <script>
        // SUPABASE SETUP
        const S_URL = 'https://qmgmvweupxffxexlovir.supabase.co';
        const S_KEY = 'sb_publishable_efpVSR2dJIB6qZsa-sWuLw_AbBae7cs';
        const sb = window.supabase.createClient(S_URL, S_KEY);

        let currentUser = localStorage.getItem('username');
        let currentUserId = localStorage.getItem('userId');
        let currentTheme = localStorage.getItem('theme') || 'light';
        let currentType = 'Kaffee';
        let currentRatingDbId = null;
        
        const tabOrder = ['kaffee', 'espresso', 'personal', 'team'];
        let currentTabIndex = 0;

        let currentRating = { strength: 0, taste: 0, aroma: 0, mundgefühl: 0, acidity: 0, aftertaste: 0 };
        const categories = [
            { id: 'strength', label: 'Stärke' }, { id: 'taste', label: 'Geschmack' },
            { id: 'aroma', label: 'Aroma' }, { id: 'mundgefühl', label: 'Mundgefühl' },
            { id: 'acidity', label: 'Säure' }, { id: 'aftertaste', label: 'Nachgeschmack' }
        ];

        window.onload = () => {
            applyTheme(currentTheme);
            checkOnboarding();
            buildStarUI();
            fetchVarieties();
        };

        /* --- THEME & ONBOARDING --- */
        function toggleTheme() {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(currentTheme);
            localStorage.setItem('theme', currentTheme);
        }
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            document.getElementById('themeIcon').innerText = '💡';
        }
        function checkOnboarding() {
            if (!currentUser) document.getElementById('loginModal').classList.remove('d-none');
            else if (!localStorage.getItem('hintsSeen')) document.getElementById('hintModal').classList.remove('d-none');
        }
        async function saveUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if (!name) return;
            const { data: user } = await sb.from('profiles').select('*').eq('username', name).maybeSingle();
            if (user) {
                currentUser = user.username; currentUserId = user.id;
            } else {
                const { data: newUser } = await sb.from('profiles').insert([{ username: name }]).select().single();
                currentUser = newUser.username; currentUserId = newUser.id;
            }
            localStorage.setItem('username', currentUser);
            localStorage.setItem('userId', currentUserId);
            document.getElementById('loginModal').classList.add('d-none');
            checkOnboarding();
        }
        function closeHint() {
            localStorage.setItem('hintsSeen', 'true');
            document.getElementById('hintModal').classList.add('d-none');
        }

        /* --- TABS & ANIMATION --- */
        function switchTab(tab, event) {
            const targetIndex = tabOrder.indexOf(tab);
            let animClass = 'fade-in';
            if (targetIndex > currentTabIndex) animClass = 'slide-in-right';
            else if (targetIndex < currentTabIndex) animClass = 'slide-in-left';
            currentTabIndex = targetIndex;

            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');

            const ratingSec = document.getElementById('ratingSection');
            const teamSec = document.getElementById('teamSection');
            
            [ratingSec, teamSec].forEach(el => el.classList.remove('slide-in-left', 'slide-in-right', 'fade-in'));
            void ratingSec.offsetWidth; // Reflow trigger

            if (tab === 'team' || tab === 'personal') {
                ratingSec.style.display = 'none';
                teamSec.style.display = 'block';
                teamSec.classList.add(animClass);
                document.getElementById('teamSectionTitle').innerText = tab === 'team' ? '🏆 Team-Bestenliste' : '🏆 Meine Favoriten';
                loadLeaderboardData(tab);
            } else {
                ratingSec.style.display = 'block';
                teamSec.style.display = 'none';
                ratingSec.classList.add(animClass);
                currentType = tab === 'kaffee' ? 'Kaffee' : 'Espresso';
                document.getElementById('typeLabel').innerText = `${currentType}sorte auswählen:`;
                fetchVarieties();
                resetForm();
            }
        }

        /* --- RATING LOGIC --- */
        function buildStarUI() {
            const container = document.getElementById('starContainer');
            container.innerHTML = '';
            categories.forEach(cat => {
                const row = document.createElement('div');
                row.className = 'rating-row';
                row.innerHTML = `<span>${cat.label}</span>`;
                const starsDiv = document.createElement('div');
                starsDiv.className = 'stars';
                for(let i=1; i<=5; i++) {
                    const star = document.createElement('span');
                    star.innerText = '★';
                    star.className = 'star';
                    star.onclick = () => setRating(cat.id, i, starsDiv);
                    starsDiv.appendChild(star);
                }
                row.appendChild(starsDiv);
                container.appendChild(row);
            });
        }
        function setRating(category, value, starsDiv) {
            currentRating[category] = value;
            Array.from(starsDiv.children).forEach((s, i) => s.classList.toggle('active', i < value));
            updateOverallScore();
        }
        function updateOverallScore() {
            const values = Object.values(currentRating).filter(v => v > 0);
            const avg = values.length ? (values.reduce((a, b) => a + b, 0) / values.length).toFixed(1) : "0.0";
            document.getElementById('overallScoreDisplay').innerText = `Gesamtbewertung: ${avg} / 5.0`;
            return avg;
        }
        function resetForm() {
            currentRatingDbId = null;
            currentRating = { strength: 0, taste: 0, aroma: 0, mundgefühl: 0, acidity: 0, aftertaste: 0 };
            document.querySelectorAll('.star').forEach(s => s.classList.remove('active'));
            document.getElementById('overallScoreDisplay').innerText = `Gesamtbewertung: 0.0 / 5.0`;
            document.getElementById('notesInput').value = '';
        }

        /* --- DATABASE ACTIONS --- */
        async function fetchVarieties() {
            const select = document.getElementById('varietySelect');
            const { data } = await sb.from('varieties').select('*').eq('type', currentType).order('name');
            select.innerHTML = '<option value="" disabled selected>Bitte wählen...</option>';
            data?.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.innerText = `${v.name} ${v.price_per_kg ? '('+v.price_per_kg+'€/kg)' : ''}`;
                select.appendChild(opt);
            });
        }
        async function addNewVarietyViaPrompt() {
            const name = prompt(`Neue ${currentType}sorte:`);
            if (!name) return;
            const price = prompt("Preis pro kg (€):");
            await sb.from('varieties').insert([{ type: currentType, name: name, price_per_kg: price ? parseFloat(price) : null }]);
            fetchVarieties();
        }
        async function checkExistingRating() {
            const vId = document.getElementById('varietySelect').value;
            const { data } = await sb.from('ratings').select('*').eq('variety_id', vId).eq('user_id', currentUserId).maybeSingle();
            if (data) {
                currentRatingDbId = data.id;
                currentRating = { strength: data.strength, taste: data.taste, aroma: data.aroma, mundgefühl: data.mundgefühl, acidity: data.acidity, aftertaste: data.aftertaste };
                document.getElementById('notesInput').value = data.notes || '';
                // Update Stars UI
                const rows = document.getElementById('starContainer').children;
                categories.forEach((cat, idx) => {
                    const stars = rows[idx].querySelector('.stars').children;
                    for(let i=0; i<5; i++) stars[i].classList.toggle('active', i < currentRating[cat.id]);
                });
                updateOverallScore();
            } else resetForm();
        }
        async function saveRating() {
            const vId = document.getElementById('varietySelect').value;
            const overall = updateOverallScore();
            if (!vId || overall == 0) return alert("Bitte Sorte wählen und Sterne vergeben!");
            const payload = { ...currentRating, variety_id: vId, username: currentUser, user_id: currentUserId, overall: parseFloat(overall), notes: document.getElementById('notesInput').value };
            const { error } = currentRatingDbId ? await sb.from('ratings').update(payload).eq('id', currentRatingDbId) : await sb.from('ratings').insert([payload]);
            if (error) alert("Fehler!"); else alert("Gespeichert!");
        }

        /* --- LEADERBOARD & NOTES --- */
        async function loadLeaderboardData(mode) {
            const container = document.getElementById('leaderboardContainer');
            container.innerHTML = '<p>Lade...</p>';
            const { data: varieties } = await sb.from('varieties').select('*');
            let query = sb.from('ratings').select('*');
            if (mode === 'personal') query = query.eq('user_id', currentUserId);
            const { data: ratings } = await query;

            let ranking = varieties.map(v => {
                const vRatings = ratings.filter(r => r.variety_id === v.id);
                if (!vRatings.length) return null;
                const avg = vRatings.reduce((a, b) => a + b.overall, 0) / vRatings.length;
                return { ...v, avg, count: vRatings.length };
            }).filter(x => x).sort((a, b) => b.avg - a.avg);

            container.innerHTML = ranking.length ? '' : '<p>Noch keine Bewertungen.</p>';
            ranking.forEach((item, i) => {
                container.innerHTML += `
                    <div class="leaderboard-item" onclick="openNotesModal('${item.id}', '${item.name}')">
                        <div><span class="rank">#${i+1}</span><strong>${item.name}</strong><br><small>${item.type}</small></div>
                        <div style="text-align:right"><span style="color:var(--star-active)">★ ${item.avg.toFixed(1)}</span><br><small>${item.count} Rez.</small></div>
                    </div>`;
            });
        }
        async function openNotesModal(vId, vName) {
            document.getElementById('notesModalTitle').innerText = vName;
            document.getElementById('notesModal').classList.remove('d-none');
            const { data } = await sb.from('ratings').select('*').eq('variety_id', vId).neq('notes', '');
            const content = document.getElementById('notesModalContent');
            content.innerHTML = data?.length ? data.map(r => `<div style="padding:10px; background:var(--bg-color); border-radius:8px; margin-bottom:10px;"><strong>${r.username} (★${r.overall})</strong><br>${r.notes}</div>`).join('') : '<p>Keine Kommentare.</p>';
        }
        function closeNotesModal() { document.getElementById('notesModal').classList.add('d-none'); }

        /* --- SWIPE GESTURES --- */
        let touchstartX = 0;
        let touchendX = 0;
        function handleGesture() {
            const diff = touchendX - touchstartX;
            if (Math.abs(diff) < 60) return;
            if (diff < 0 && currentTabIndex < tabOrder.length - 1) {
                const nextBtn = document.querySelectorAll('.tab-btn')[currentTabIndex + 1];
                switchTab(tabOrder[currentTabIndex + 1], { target: nextBtn });
            } else if (diff > 0 && currentTabIndex > 0) {
                const prevBtn = document.querySelectorAll('.tab-btn')[currentTabIndex - 1];
                switchTab(tabOrder[currentTabIndex - 1], { target: prevBtn });
            }
        }
        document.getElementById('app').addEventListener('touchstart', e => touchstartX = e.changedTouches[0].screenX, {passive: true});
        document.getElementById('app').addEventListener('touchend', e => { touchendX = e.changedTouches[0].screenX; handleGesture(); }, {passive: true});
    </script>
</body>
</html>
